<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche de Film ou Série</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    let CONFIG = {};
    let radarrProfiles = [];
    let sonarrProfiles = [];
    let currentPage = 1;
    const resultsPerPage = 6;
    let searchResults = [];

    async function loadConfig() {
      try {
        let response = await fetch('/config');
        CONFIG = await response.json();
      } catch (error) {
        console.error("Erreur lors du chargement de la configuration:", error);
      }
    }

    async function loadQualityProfiles() {
      try {
        let radarrResponse = await fetch(`${CONFIG.radarr.baseURL}/api/v3/qualityProfile?apikey=${CONFIG.radarr.apiKey}`);
        radarrProfiles = await radarrResponse.json();

        let sonarrResponse = await fetch(`${CONFIG.sonarr.baseURL}/api/v3/qualityProfile?apikey=${CONFIG.sonarr.apiKey}`);
        sonarrProfiles = await sonarrResponse.json();
      } catch (error) {
        console.error("Erreur lors du chargement des profils de qualité:", error);
      }
    }

    async function searchContent() {
      let query = document.getElementById("searchQuery").value;
      let searchType = document.getElementById("searchType").value;
      if (!query) return;

      // Afficher l'indicateur de chargement
      document.getElementById("loadingIndicator").classList.remove("hidden");

      let apiUrl = searchType === "film"
        ? `${CONFIG.radarr.baseURL}/api/v3/movie/lookup?term=${query}&apikey=${CONFIG.radarr.apiKey}&language=fr`
        : `${CONFIG.sonarr.baseURL}/api/v3/series/lookup?term=${query}&apikey=${CONFIG.sonarr.apiKey}&language=fr`;

      let response = await fetch(apiUrl);
      searchResults = await response.json(); // Stocker les résultats
      currentPage = 1; // Réinitialiser à la première page
      displayResults(); // Afficher la première page

      // Cacher l'indicateur après le chargement
      document.getElementById("loadingIndicator").classList.add("hidden");
    }

    function displayResults() {
      let resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      if (searchResults.length === 0) {
        resultsDiv.innerHTML = "<p>Aucun résultat trouvé.</p>";
        return;
      }

      let start = (currentPage - 1) * resultsPerPage;
      let end = start + resultsPerPage;
      let paginatedResults = searchResults.slice(start, end);

      paginatedResults.forEach(item => {
        let searchType = document.getElementById("searchType").value;
        let poster = item.images?.find(img => img.coverType === "poster")?.remoteUrl || "https://placehold.co/100x150?text=No+Image";

        // Vérifier si l'ID est valide
        let id = searchType === "film" ? item.tmdbId : item.tvdbId;
        let qualityOptions = (searchType === "film" ? radarrProfiles : sonarrProfiles)
            .map(p => `<option value="${p.id}">${p.name}</option>`).join("");

        let addFunction = `addToLibrary('${id}', '${searchType}')`;

        resultsDiv.innerHTML += `
          <div class='card'>
            <img src='${poster}' alt='Affiche'>
            <div class='info'>
              <h3>${searchType === "film" ? "[Film]" : "[Série]"} ${item.title} (${item.year})</h3>
              <p>${item.overview || "Synopsis non disponible."}</p>
              <select id="quality-${id}">${qualityOptions}</select>
              <button onclick="${addFunction}">Ajouter</button>
            </div>
          </div>`;
      });

      displayPaginationControls();
    }


    function displayPaginationControls() {
      let paginationDiv = document.getElementById("pagination");
      paginationDiv.innerHTML = "";

      if (searchResults.length <= resultsPerPage) return; // Pas besoin de pagination

      let totalPages = Math.ceil(searchResults.length / resultsPerPage);

      let prevButton = `<button onclick="changePage(-1)" ${currentPage === 1 ? "disabled" : ""}>⬅️ Précédent</button>`;
      let nextButton = `<button onclick="changePage(1)" ${currentPage === totalPages ? "disabled" : ""}>Suivant ➡️</button>`;

      paginationDiv.innerHTML = `
        <div class="pagination-controls">
          ${prevButton}
          <span>Page ${currentPage} / ${totalPages}</span>
          ${nextButton}
        </div>
      `;
    }

    function changePage(direction) {
      let totalPages = Math.ceil(searchResults.length / resultsPerPage);
      currentPage += direction;

      if (currentPage < 1) currentPage = 1;
      if (currentPage > totalPages) currentPage = totalPages;

      displayResults();
    }

    async function addToLibrary(id, type) {
      let qualitySelect = document.getElementById(`quality-${id}`);

      if (!qualitySelect) {
        alert("Erreur : Impossible de récupérer le profil de qualité.");
        console.error(`Élément non trouvé : quality-${id}`);
        return;
      }

      // Afficher l'indicateur de chargement
      document.getElementById("loadingIndicator").classList.remove("hidden");

      let qualityProfileId = parseInt(qualitySelect.value);
      let apiUrl, data, apiKey;

      // Trouver l'élément correspondant dans `searchResults`
      let item = searchResults.find(el => (type === "film" ? el.tmdbId == id : el.tvdbId == id));
      if (!item) {
          alert("Erreur : Impossible de récupérer les informations du contenu.");
          console.error("Élément introuvable dans searchResults", id);
          return;
      }

      let itemTitle = item.title || "Titre inconnu"; // On s'assure que Title est toujours présent
      let itemYear = item.year || new Date().getFullYear(); // On met l'année actuelle si absente

      if (type === "film") {
        apiUrl = `${CONFIG.radarr.baseURL}/api/v3/movie`;
        apiKey = CONFIG.radarr.apiKey;
        data = {
          tmdbId: id,
          title: itemTitle, // Ajout du titre
          year: itemYear,
          qualityProfileId: qualityProfileId,
          rootFolderPath: "/movies",
          monitored: true
        };
      } else {
        apiUrl = `${CONFIG.sonarr.baseURL}/api/v3/series`;
        apiKey = CONFIG.sonarr.apiKey;
        data = {
          tvdbId: id,
          title: itemTitle, // Ajout du titre
          year: itemYear,
          qualityProfileId: qualityProfileId,
          rootFolderPath: "/tv",
          monitored: true
        };
      }

      let response = await fetch(apiUrl, {
        method: "POST",
        headers: { "X-Api-Key": apiKey, "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      // Cacher l'indicateur après la requête
      document.getElementById("loadingIndicator").classList.add("hidden");

      if (response.ok) {
        alert(`${type === "film" ? "Film" : "Série"} ajouté(e) avec succès !`);

        // Lancer la recherche dans Radarr (pas nécessaire pour Sonarr)
        if (type === "film") {
          let movie = await response.json();
          await fetch(`${CONFIG.radarr.baseURL}/api/v3/command`, {
            method: "POST",
            headers: { "X-Api-Key": apiKey, "Content-Type": "application/json" },
            body: JSON.stringify({ name: "MoviesSearch", movieIds: [movie.id] })
          });
          //alert("Recherche du film lancée !");
        }
      } else {
        alert("Erreur : " + await response.text());
      }
    }

    async function init() {
      await loadConfig(); // Attendre que CONFIG soit chargé
      await loadQualityProfiles(); // Ensuite charger les profils de qualité

      // Déclenche la recherche automatiquement après 3 caractères saisis
      document.getElementById("searchQuery").addEventListener("input", function() {
        if (this.value.length >= 3) {
          searchContent();
        }
      });

      // Relancer la recherche si l'utilisateur change le type (Film / Série)
      document.getElementById("searchType").addEventListener("change", function() {
        if (document.getElementById("searchQuery").value.length >= 3) {
          searchContent();
        }
      });
    }

    init();
  </script>
  <style>
      body { background-color: #1e1e2e; color: #ffffff; font-family: Arial, sans-serif; }
      .container { max-width: 800px; margin: 50px auto; text-align: center; }
      .search-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
      .search-box input, .search-box select { padding: 12px; border: none; font-size: 16px; border-radius: 5px; }
      .search-box input { width: 60%; background-color: #fff; color: black; }
      .search-box select { background-color: #ff8c00; color: white; font-weight: bold; cursor: pointer; }
      .search-box button { padding: 12px 20px; background: #ff8c00; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 16px; }
      .card { display: flex; align-items: center; background: #2a2a3a; padding: 15px; margin: 10px 0; border-radius: 10px; }
      .card img { width: 80px; height: 120px; border-radius: 5px; }
      .card .info { margin-left: 15px; text-align: left; }
      .card h3 { margin: 0; font-size: 18px; }
      .card p { font-size: 14px; color: #bbbbbb; }
      .card select, .card button { background: #ff8c00; border: none; padding: 8px 12px; margin-top: 5px; color: white; border-radius: 5px; cursor: pointer; font-size: 14px; }
      .pagination {
        margin-top: 20px;
        text-align: center;
      }

      .pagination-controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        align-items: center;
      }

      .pagination-controls button {
        background: #ff8c00;
        color: white;
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }

      .pagination-controls button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      .hidden {
        display: none;
      }

      #loadingIndicator {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #ff8c00;
        margin-top: 20px;
      }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-3xl font-bold mb-4">Recherche de Film ou Série</h1>
    <div class="search-box">
      <input type="text" id="searchQuery" placeholder="Nom du film ou de la série">
      <select id="searchType">
        <option value="film">Film</option>
        <option value="serie">Série</option>
      </select>
    </div>
    <div id="loadingIndicator" class="hidden">
      <p>🔄 Recherche en cours...</p>
    </div>
    <div id="pagination" class="pagination"></div>
    <div id="results"></div>
  </div>
</body>
</html>
