<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flix</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js"></script>
</head>
<header class="header-container">
  <img src="images/logo.png" alt="Logo Recherche Films & Séries" class="logo">
  <h1 class="page-title">&nbsp;|&nbsp;Recherche de Films ou Séries</h1>
</header>
<body>
  <div class="container">
    <div class="search-box">
      <input type="text" id="searchQuery" placeholder="Nom du film ou de la série">
    </div>
    <div id="loadingIndicator" class="loading-indicator hidden">
      <p>🔄 Recherche en cours...</p>
    </div>
    <div class="results-container">
      <div class="results-column">
        <h2 class="category-title">🎬 Films</h2>
        <div id="filmPagination" class="pagination"></div>
        <div id="filmResults"></div>
      </div>
      <div class="results-column">
        <h2 class="category-title">📺 Séries</h2>
        <div id="seriePagination" class="pagination"></div>
        <div id="serieResults"></div>
      </div>
    </div>
  </div>
</body>
</html>
