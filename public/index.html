<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche de Film ou Série</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body>
  <div class="container">
    <h1 class="text-3xl font-bold mb-4">Recherche de Film ou Série</h1>
    <div class="search-box">
      <input type="text" id="searchQuery" placeholder="Nom du film ou de la série">
    </div>
    <div id="loadingIndicator" class="hidden">
      <p>🔄 Recherche en cours...</p>
    </div>
    <div class="results-container">
      <div class="results-column">
        <h2 class="category-title">🎬 Films</h2>
        <div id="filmPagination" class="pagination"></div>
        <div id="filmResults"></div>
      </div>
      <div class="results-column">
        <h2 class="category-title">📺 Séries</h2>
        <div id="seriePagination" class="pagination"></div>
        <div id="serieResults"></div>
      </div>
    </div>
  </div>
</body>
</html>
